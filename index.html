<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dumate Studio · 内容生产工作台</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/components.css" />
    <link rel="stylesheet" href="./styles/views.css" />
    <link rel="stylesheet" href="./styles/agent.css" />
  </head>
  <body data-zone="overview">

    <!-- 登录分流 -->
    <div id="loginGate" class="login-gate" hidden>
      <div class="lg-aurora"><i></i><i></i><i></i></div>
      <div class="lg-particles" id="lgParticles"></div>
      <div class="lg-card">
        <div class="lg-brand">
          <svg viewBox="0 0 48 48" width="54" height="54" aria-hidden="true">
            <defs>
              <linearGradient id="lgG" x1="4" y1="25" x2="44" y2="25" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#3D5BFF"/><stop offset="1" stop-color="#8B46FF"/>
              </linearGradient>
              <mask id="lgN"><rect width="48" height="48" fill="#fff"/><circle cx="42.5" cy="9" r="8.5" fill="#000"/></mask>
            </defs>
            <g mask="url(#lgN)">
              <rect x="4" y="9" width="40" height="32" rx="9" fill="url(#lgG)"/>
              <rect x="11" y="14.5" width="26" height="21" rx="4.5" fill="#fff"/>
            </g>
            <path d="M21 20.3c0-1.08 1.18-1.74 2.1-1.17l7.7 4.8c.86.54.86 1.8 0 2.34l-7.7 4.8c-.92.57-2.1-.09-2.1-1.17V20.3z" fill="url(#lgG)"/>
            <path d="M41 2c.62 3.4 2.6 5.38 6 6-3.4.62-5.38 2.6-6 6-.62-3.4-2.6-5.38-6-6 3.4-.62 5.38-2.6 6-6z" fill="url(#lgG)"/>
          </svg>
          <h1>Dumate Studio</h1>
          <p>账号矩阵 · AI 内容生产 · 人工审核 · 交付分发</p>
        </div>
        <div class="lg-roles">
          <button class="lg-role" data-role="studio" type="button">
            <span class="lgr-ico studio">
              <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 6h11v12H4z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M15 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            </span>
            <span class="lgr-text"><strong>创作端登录</strong><span>内部团队 · 账号矩阵 / Agent 量产 / 剪辑 / 审核</span></span>
            <span class="lgr-go">→</span>
          </button>
          <button class="lg-role" data-role="supplier" type="button">
            <span class="lgr-ico supplier">
              <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 16V4m0 12l-4-4m4 4l4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </span>
            <span class="lgr-text"><strong>供应商登录</strong><span>外部合作方 · 仅可浏览 / 下载成片素材</span></span>
            <span class="lgr-go">→</span>
          </button>
        </div>
        <p class="lg-foot">供应商账号自动进入素材库，不可访问创作界面</p>
      </div>
    </div>

    <!-- 应用外壳：图标导航 + 上下文面板 + 主画布 -->
    <div class="app-shell">
      <nav class="nav-rail">
        <div class="rail-logo" id="railBrand" title="Dumate Studio"></div>
        <div class="rail-items">
          <button class="rail-item" data-nav="overview" title="总览">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M4 4h7v7H4zM13 4h7v7h-7zM4 13h7v7H4zM13 13h7v7h-7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <span>总览</span>
          </button>
          <button class="rail-item accent" data-nav="agent" title="Agent 工作台">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 2l2.1 5.6L20 10l-5.9 2.4L12 18l-2.1-5.6L4 10l5.9-2.4L12 2z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M18.5 15.5l.9 2.3 2.3.9-2.3.9-.9 2.3-.9-2.3-2.3-.9 2.3-.9.9-2.3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
            <span>Agent</span>
          </button>
          <button class="rail-item" data-nav="studio" title="创作空间">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M4 6h11v12H4z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M15 10l5-3v10l-5-3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <span>创作</span>
          </button>
          <button class="rail-item" data-nav="assets" title="资产库">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M3 7a2 2 0 012-2h4l2 2h9a1 1 0 011 1v10a2 2 0 01-2 2H5a2 2 0 01-2-2V7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <span>资产</span>
          </button>
          <button class="rail-item" data-nav="delivery" title="交付中心">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M21 8l-9-5-9 5v8l9 5 9-5V8z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M3.3 8.3L12 13l8.7-4.7M12 13v8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
            <span>交付</span>
          </button>
        </div>
        <div class="rail-bottom">
          <button class="rail-item" data-nav="settings" title="设置">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M19.4 13a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-2.94.67 2 2 0 11-3.96 0 1.65 1.65 0 00-2.94-.67l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 13a2 2 0 110-3.96 1.65 1.65 0 00.67-2.94l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 002.94-.67 2 2 0 113.96 0 1.65 1.65 0 002.94.67l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.67 2.94 2 2 0 110 3.96z" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
            <span>设置</span>
          </button>
          <button class="rail-item" id="navLogout" title="退出登录">
            <svg viewBox="0 0 24 24" width="19" height="19"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span>退出</span>
          </button>
        </div>
      </nav>

      <aside class="ctx-panel" id="ctxPanel" hidden></aside>

      <div class="main-col">
        <header class="topbar">
          <div class="top-crumb" id="topCrumb">总览</div>
          <div class="top-actions">
            <button class="top-btn" id="topSearch" title="搜索（⌘K）">
              <svg viewBox="0 0 24 24" width="15" height="15"><path d="M21 21l-4.3-4.3M11 19a8 8 0 110-16 8 8 0 010 16z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
              <span>搜索</span><kbd>⌘K</kbd>
            </button>
            <button class="top-btn icon" id="topBell" title="通知中心">
              <svg viewBox="0 0 24 24" width="16" height="16"><path d="M18 8a6 6 0 10-12 0c0 7-3 8-3 8h18s-3-1-3-8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.3 21a2 2 0 003.4 0" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
              <em class="badge" id="notifyBadge" hidden></em>
            </button>
          </div>
        </header>
        <main class="view-root" id="viewRoot"></main>
      </div>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
